name: docs-ci

on:
  push:
    branches: [main, feat/*, codex/*]
  pull_request:
    branches: [main]

jobs:
  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run markdownlint
        run: npx markdownlint-cli2 '**/*.md' '#node_modules' '#.git'

  link-check:
    name: Link Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check external links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: "yes"
          config-file: ".mlc-config.json"
          max-depth: 2

  example-smoke:
    name: Example Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run example smoke tests
        run: |
          shopt -s nullglob
          for dir in examples/*/; do
            if [ -f "$dir/test_example.py" ]; then
              echo "--- Testing: $dir ---"
              python "$dir/test_example.py"
            fi
          done
