name: Smoke Test

on:
  push:
    branches: [main, feat/*]
    paths:
      - 'examples/**'
      - '.github/workflows/smoke-test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'examples/**'
  workflow_dispatch:

jobs:
  validate-examples:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        example: [daily-news-digest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Smoke test
        run: python examples/${{ matrix.example }}/test_example.py

      - name: Validate YAML frontmatter
        shell: python
        run: |
          import yaml, re, sys
          with open(f'examples/${{ matrix.example }}/SKILL.md') as f:
              m = re.match(r'^---\n(.*?)\n---', f.read(), re.DOTALL)
              assert m, 'No frontmatter'
              fm = yaml.safe_load(m.group(1))
              assert 'name' in fm, 'Missing name'
              assert 'version' in fm, 'Missing version'
              assert 'triggers' in fm, 'Missing triggers'
              print(f'PASS: {fm["name"]} v{fm["version"]}')
